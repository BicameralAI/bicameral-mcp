# Repo-local governance facts for bicameral-mcp.
# Canonical organization inventory: BicameralAI/bicameral-factory#227 and PR #231.
# This descriptor records verified repository-local facts. It does not claim that
# organization rulesets or required checks are live before post-apply evidence exists.
schema_version: 1
repo: BicameralAI/bicameral-mcp
classification: product-supporting
visibility: public
governance_owner: BicameralAI/bicameral-factory
runtime_role: agent-surface
release_trust_required: true
# Exact required check contexts remain to be observed from successful exact-head runs.
# An empty list means not established, not exempt.
required_checks: []
branch_protection:
  main:
    require_pr: false
    required_approvals: 0
    require_status_checks: false
    restrict_force_push: false
shadow_genome_sources:
  - failed_ci
  - reverted_prs
  - governance_gate_failures
  - correction_records
  - repeated_review_findings
public_exposure:
  allowed:
    - public MCP contracts
    - approved usage documentation
    - redacted examples
    - public governance metadata
  prohibited:
    - customer data
    - private tool results
    - live review queues
    - private vulnerability details
    - organization secrets or evidence references
