name: Security Scan

# Bandit SAST (blocking) + pip-audit (advisory). Vendored rather than consumed:
# bicameral-integrations has no reusable for these, and the scan targets differ
# for mcp's flat package layout. Actions SHA-pinned per #544.
# See docs/research-brief-557-ci-security-gates-2026-06-08.md (#557).

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  bandit:
    # ADVISORY for now (continue-on-error) — a first SAST pass on this large,
    # never-scanned codebase surfaces pre-existing findings. Most are Low-severity
    # (try/except/pass, subprocess-partial-path); the actionable ones are the
    # Medium B608 (hardcoded_sql_expressions) sites in the ledger/CLI query paths,
    # which #562 (daemon/projection query safety) remediates. Flip to blocking
    # (drop continue-on-error) once #562 lands and the B608 backlog is clear.
    name: Bandit SAST (advisory — flips to blocking after #562)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip bandit==1.8.6
      - name: Bandit (package source — Medium+ severity/confidence)
        # Recurse the repo; in CI only tracked source is present. Exclude tests,
        # the JS dashboard, docs, retired mocks, and .claude tooling hooks. B101
        # (assert_used) skipped. Medium+ thresholds focus on actionable findings
        # (incl. the B608 SQL-injection vectors #562 targets) over Low-severity style.
        run: bandit -r . --exclude './tests,./dashboard,./docs,./mocks,./.claude' --skip B101 --severity-level medium --confidence-level medium

  pip-audit:
    name: pip-audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip pip-audit==2.9.0
      - name: Install project runtime deps so pip-audit sees them
        run: python -m pip install -e .
      - name: Audit installed dependencies for known CVEs
        run: pip-audit
