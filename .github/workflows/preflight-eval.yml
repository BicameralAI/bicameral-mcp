name: Preflight Failure-Mode Eval

# Advisory dashboard for the failure-scenarios catalog. Runs on PRs that
# touch preflight retrieval, the eval files, or the catalog itself.
# **Non-blocking**: continue-on-error means a red eval does not gate
# merge. Promote to blocking once the catalog has stabilised and the
# xfailed rows have been fixed in code.
#
# Note: when this workflow file lands, it will not run on the PR that
# adds it — pull_request workflows execute the version on the base
# branch (main). First execution is on the next qualifying PR after merge.

on:
  pull_request:
    branches: [main]
    paths:
      - 'handlers/preflight.py'
      - 'handlers/sync_middleware.py'
      - 'ledger/adapter.py'
      - 'ledger/queries.py'
      - 'code_locator/**'
      - 'skills/bicameral-preflight/SKILL.md'
      - 'skills/bicameral-history/SKILL.md'
      - 'tests/eval/**'
      - 'docs/preflight-failure-scenarios.md'
      - '.github/workflows/preflight-eval.yml'

env:
  PYTHON_VERSION: '3.11'

jobs:
  preflight-eval:
    name: Preflight Failure-Mode Eval (advisory)
    runs-on: ubuntu-latest
    # Non-blocking — failures surface in PR checks but do not gate merge.
    # Today's expected state: 6 passed, 4 xfailed (M6, M7a/b/c — open in
    # catalog with mitigations queued). Strict-xfail flips a row to fail
    # when its underlying fix lands, forcing a catalog status update.
    continue-on-error: true
    env:
      SURREAL_URL: 'memory://'
      REPO_PATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[test]"

      # Single pytest run covers:
      # - dataset schema validation
      # - catalog ↔ dataset consistency (drift guard)
      # - parametrized handler-layer scenarios (M5, M5_hitl_global, M6,
      #   M7a/b/c, FF2, FF4) with strict-xfail on open rows
      - name: Failure-mode eval
        id: failure_modes
        run: |
          mkdir -p test-results
          pytest tests/eval/run_preflight_eval.py \
            -v --tb=short \
            --junitxml=test-results/preflight-eval.xml

      - name: Surface results in step summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results/preflight-eval.xml
          show: fail, skip

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-eval-results
          path: test-results/
          retention-days: 30
