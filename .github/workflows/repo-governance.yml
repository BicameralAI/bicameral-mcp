name: Repo Governance

on:
  pull_request:
    branches: [dev, main]
    paths:
      - ".bicameral/repo-governance.yaml"
      - ".bicameral/repo-governance.schema.json"
      - "scripts/validate_repo_governance.py"
      - ".github/workflows/repo-governance.yml"
  push:
    branches: [dev, main]
    paths:
      - ".bicameral/repo-governance.yaml"
      - ".bicameral/repo-governance.schema.json"
      - "scripts/validate_repo_governance.py"
      - ".github/workflows/repo-governance.yml"

permissions:
  contents: read

jobs:
  repo-governance:
    name: repo-governance
    runs-on: ubuntu-latest
    steps:
      - name: Check out MCP repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Validate descriptor
        run: python3 scripts/validate_repo_governance.py .bicameral/repo-governance.yaml

      - name: Compile validator
        run: python3 -m py_compile scripts/validate_repo_governance.py
