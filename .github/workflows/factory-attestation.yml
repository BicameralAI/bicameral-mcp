name: Bicameral factory attestation

on:
  pull_request:
    branches: [dev, main]

jobs:
  factory-attestation:
    name: bicameral-factory-attestation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate factory attestation
        run: python3 .github/scripts/validate_factory_attestation.py .bicameral/factory-attestations
