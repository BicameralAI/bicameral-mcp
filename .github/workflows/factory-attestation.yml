name: Bicameral factory attestation

on:
  pull_request:
    branches: [dev, main]

jobs:
  factory-attestation:
    name: bicameral-factory-attestation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate factory attestation
        run: python3 .github/scripts/validate_factory_attestation.py .bicameral/factory-attestations
