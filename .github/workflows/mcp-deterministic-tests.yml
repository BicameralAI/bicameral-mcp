name: MCP Deterministic Tests

# Deterministic product and customer-artifact gate. No LLM, daemon endpoint,
# private Factory checkout, or production credential is available by design.
on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (deterministic, no daemon, no LLM)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements-ci.lock

      - name: Install package without resolving dependencies
        run: python -m pip install --no-build-isolation --no-deps .

      - name: Replay deterministic v0 user flow
        run: python scripts/sim_issue_108_flows.py --check

      - name: Run deterministic test suite
        run: python -m pytest tests/ -q

      - name: Verify vendored artifact validator provenance
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          record = json.loads(
              Path('.bicameral/validator-provenance/customer-artifact-boundary.json')
              .read_text(encoding='utf-8')
          )
          validator = Path(record['validator_path'])
          actual = subprocess.check_output(
              ['git', 'hash-object', str(validator)], text=True
          ).strip()
          expected = record['source_blob_sha']
          if actual != expected:
              raise SystemExit(
                  f'vendored validator drift: expected Git blob {expected}, got {actual}'
              )
          if record.get('runtime_distribution') != 'prohibited':
              raise SystemExit('validator provenance must prohibit runtime distribution')
          print(f'validator provenance verified: Git blob {actual}')
          PY

      - name: Build customer distributions
        run: |
          rm -rf build dist
          python -m build

      - name: Enforce customer artifact boundary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts/customer-artifact-boundary
          mapfile -t artifacts < <(
            find dist -maxdepth 1 -type f \( -name '*.whl' -o -name '*.tar.gz' \) | sort
          )
          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo 'No wheel or source distribution was produced.' >&2
            exit 1
          fi
          args=()
          for artifact in "${artifacts[@]}"; do
            args+=(--artifact "$artifact")
          done
          python .github/scripts/validate_customer_artifact_boundary.py \
            "${args[@]}" \
            --policy .bicameral/customer-artifact-boundary.json \
            --report test-artifacts/customer-artifact-boundary/receipt.json

      - name: Retain customer artifact boundary receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mcp-customer-artifact-boundary-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-artifacts/customer-artifact-boundary/
          if-no-files-found: warn
          retention-days: 90
