name: Atlas Release Unit gate

on:
  status:

permissions:
  contents: read
  pull-requests: read
  id-token: write
  statuses: write

concurrency:
  group: atlas-release-unit-${{ github.event.sha }}-${{ github.event.context }}
  cancel-in-progress: false

jobs:
  resolve-release-unit:
    if: >-
      github.event.state == 'pending' &&
      (github.event.context == 'release-unit / assigned' ||
       github.event.context == 'release-unit / merge-eligible')
    uses: BicameralAI/bicameral-factory/.github/workflows/atlas-release-unit-status.yml@6ec555cf02078e5d937d086055d435573655573a
    with:
      factory_ref: 6ec555cf02078e5d937d086055d435573655573a
      workload_identity_provider: projects/694608247534/locations/global/workloadIdentityPools/github-actions/providers/bicameral-mcp-atlas-receipts
      service_account: atlas-receipts-mcp@bicameral-cloud-500911.iam.gserviceaccount.com
    secrets:
      cross_repo_token: ${{ secrets.BICAMERAL_CROSS_REPO_TOKEN }}
