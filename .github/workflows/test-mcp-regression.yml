name: MCP Regression Tests

on:
  pull_request:
    branches: [main, dev]

env:
  PYTHON_VERSION: '3.11'

jobs:
  mcp-tests:
    name: MCP Regression Suite
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    # Needed so ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }} / ANTHROPIC_API_KEY
    # (environment secrets scoped to `ci-test`) is injected into the M1
    # extraction step. The env is gate-free so this does not block
    # PR-triggered runs.
    environment: ci-test
    env:
      SURREAL_URL: 'memory://'
      REPO_PATH: ${{ github.workspace }}
      BICAMERAL_SKIP_CONSENT_NOTICE: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[test]" pytest-html

      # ── Symlink materialization gate (#357 sub-task 4) ─────────────
      # PR #307 replaced .claude/skills/bicameral-* duplicates with symlinks
      # to canonical skills/. On Windows, git stores these as mode-120000
      # entries but checks them out as plain text files containing the
      # target path string UNLESS core.symlinks=true was set before clone.
      # The result is silent breakage — Claude Code's slash-command resolver
      # can't follow the broken symlinks. The runtime tests pass because
      # they don't go through the slash-command surface, so this needs a
      # dedicated gate.
      #
      # `git ls-files -s` shows mode-120000 for tracked symlinks on every
      # platform; that's our cross-platform source of truth. We then check
      # actual materialization differs by platform: POSIX should see a
      # real symlink (Path.is_symlink()), Windows with core.symlinks=true
      # should also see a real symlink, Windows without should see a plain
      # file. Failing this catches misconfigured Windows clones AND any
      # regression that drops a tracked symlink to a plain file.
      - name: Assert .claude/skills/ symlinks are mode-120000 in git
        shell: bash
        run: |
          count=$(git ls-files -s .claude/skills/ | awk '$1 == "120000"' | wc -l | tr -d ' ')
          echo "Tracked symlink entries in .claude/skills/: $count"
          if [ "$count" -lt 22 ]; then
            echo "::error::Expected at least 22 mode-120000 entries under .claude/skills/, got $count."
            echo "::error::PR #307 established the symlink contract; a regression here means a"
            echo "::error::skill mirror has been re-committed as a plain file (or was deleted)."
            exit 1
          fi
      - name: Assert symlinks materialize on this platform
        shell: bash
        # ASCII-only print messages — Windows Python defaults to cp1252 for
        # stdout and crashes with UnicodeEncodeError on em-dash / arrow chars.
        # PYTHONIOENCODING=utf-8 would also work but ASCII is simpler.
        run: |
          python - <<'PY'
          import os, sys
          from pathlib import Path
          probe = Path(".claude/skills/bicameral-preflight")
          if not probe.exists():
              print(f"::error::{probe} missing entirely")
              sys.exit(1)
          if probe.is_symlink():
              print(f"OK - {probe} resolves as a symlink -> {os.readlink(probe)}")
              sys.exit(0)
          # If we land here on Windows, core.symlinks=false swallowed the
          # symlink and the file now contains the target path as text.
          content = probe.read_text().strip() if probe.is_file() else "<missing>"
          if content.startswith("../../skills/"):
              print(
                  "::error::Windows clone without core.symlinks=true - "
                  ".claude/skills/bicameral-preflight is a plain file containing the "
                  f"path string {content!r} instead of resolving to the canonical "
                  "skills/ directory. Set `core.symlinks=true` before cloning (or "
                  "clone via WSL). See CLAUDE.md 'Canonical Skill Source' section."
              )
              sys.exit(1)
          print(
              f"::error::Unexpected state - {probe} is neither a symlink nor a "
              f"path-string text file: {content!r}"
          )
          sys.exit(1)
          PY

      # ── Build code locator index ───────────────────────────────────
      - name: Build code locator index
        run: |
          python -c "
          import os
          os.environ['REPO_PATH'] = os.environ.get('REPO_PATH', '.')
          from code_locator_runtime import ensure_runtime_env, rebuild_index
          from code_locator.config import load_config
          ensure_runtime_env()
          config = load_config()
          rebuild_index(os.environ['REPO_PATH'], config, force=True)
          print(f'Index built at {config.sqlite_db}')
          "

      # ── Clone OSS repos for eval ground truth ────────────────────────
      # Only medusa is needed — saleor/vendure were used by eval_code_locator.py
      # which was removed in v0.6.4 when search_code was nuked.
      # Ubuntu-only: bash function syntax + medusa corpus consumed by
      # the Linux-only M1 adversarial eval and E2E report below.
      - name: Clone eval repos (shallow, pinned commits)
        if: matrix.os == 'ubuntu-latest'
        run: |
          clone_at_commit() {
            local repo_url=$1 dest=$2 commit=$3
            mkdir -p "$dest"
            cd "$dest"
            git init -q
            git remote add origin "$repo_url"
            git fetch --depth 1 origin "$commit"
            git checkout FETCH_HEAD
            cd -
          }
          mkdir -p test-results/.repos
          clone_at_commit https://github.com/medusajs/medusa test-results/.repos/medusa dbff8196af90042829a5b8fd06adb27d7b8b5df3

      # ── Run all phases in a single pytest invocation ───────────────
      # #399 Stage C: shadow-mode tests + parity gate join the regression
      # suite. The parity tests (test_tags_extractor_parity.py,
      # test_extract_go_substrate.py) do clone-on-demand sparse fetches of
      # k8s / hugo / ripgrep / cargo — net effect adds ~10s per CI run.
      # The shadow dispatch + telemetry tests are pure-function and add ~0.3s.
      - name: Run MCP regression tests
        run: >
          pytest
          tests/test_phase1_code_locator.py
          tests/test_phase2_ledger.py
          tests/test_phase3_integration.py
          tests/test_legacy_ledger_fixtures.py
          tests/test_schema_recoverable_errors.py
          tests/test_replay_helpers_unit.py
          tests/test_replay_determinism.py
          tests/test_tags_extractor_parity.py
          tests/test_extract_go_substrate.py
          tests/test_m_shadow_divergence_log.py
          tests/test_shadow_dispatch.py
          tests/test_dashboard_pulse.py
          tests/test_dashboard_unclassified_rendering.py
          tests/test_dashboard_source_view.py
          tests/test_dashboard_admin_panel.py
          tests/test_dashboard_remove_flows.py
          -v --tb=short
          --junitxml=test-results/results.xml
          --html=test-results/report.html --self-contained-html

      # ── M_shadow_parity — rate-based CI gate (#399 Stage C) ─────────
      # Walks the Python in-repo corpus + clone-on-demand Go/Rust corpora
      # used by the parity tests, runs walker AND substrate per file,
      # aggregates ``divergence_kind`` counts per language, and fails the
      # gate when ``substrate-subset`` rate > 1% per the #399 plan.
      #
      # Different from the pytest parity gate (binary pass/fail per file) —
      # M_shadow_parity is the rate-based metric mirroring how production
      # shadow telemetry will surface drift once Stages D-E flip languages
      # to shadow mode. Both gates currently agree (every file passes both)
      # but M_shadow_parity gives the per-language summary needed for
      # operating the rollout.
      #
      # Ubuntu-only: corpora live on Ubuntu (mirrors the existing
      # Linux-only eval steps). Cache is per-job; the script re-clones each
      # run (~5s for all four sources combined via sparse-checkout).
      - name: M_shadow_parity (hard gate)
        if: matrix.os == 'ubuntu-latest'
        run: >
          python tests/eval_shadow_parity.py
          --gate-mode hard
          --max-subset-rate 0.01
          -o test-results/m-shadow-parity.json
          --github-summary
          >> "$GITHUB_STEP_SUMMARY"

      # ── Diagnostic: report ANTHROPIC_API_KEY visibility ───────────
      # GitHub masks secret values in logs, but we can safely report
      # (a) whether the secret-expression evaluates to non-empty and
      # (b) the length of the resolved value. Lets us distinguish
      # "secret is not set" from "secret is set to empty string" from
      # "secret is set correctly" without ever exposing the key.
      - name: M1 secret visibility probe
        if: matrix.os == 'ubuntu-latest'
        run: |
          set +e
          if [ -n "${ANTHROPIC_API_KEY}" ]; then
            echo "ANTHROPIC_API_KEY: present (length=${#ANTHROPIC_API_KEY})"
          else
            echo "ANTHROPIC_API_KEY: EMPTY or UNSET"
            echo "  secret expression non-empty: ${{ secrets.ANTHROPIC_API_KEY != '' }}"
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ── M1 decision relevance: adversarial corpus (warn-only) ────
      # Runs the current skills/bicameral-ingest/SKILL.md through
      # the headless Anthropic extraction driver against the 5 adversarial
      # transcripts (tests/fixtures/transcripts/adv-*.md), then scores
      # extraction P/R/F1 against the committed Opus ground truth via
      # Haiku LLM-as-judge. Phase 5 skill-spec branches use this step
      # to compare adversarial deltas across SKILL.md variants.
      #
      # The "adversarial" key in --multi-repo aliases to the medusa clone
      # purely so the grounding pipeline has *some* indexed code to run
      # against; adversarial transcripts measure extraction quality, not
      # grounding against any specific codebase.
      #
      # Auth: ANTHROPIC_API_KEY (ci-test environment secret) sent as
      # the x-api-key header. Warn-only — a missing/rotated key surfaces
      # as a red "M1 adversarial" step in the job without failing the
      # whole build, so the rest of the regression suite still reports.
      - name: M1 adversarial corpus eval (warn-only)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          M1_EVAL_MODEL: claude-haiku-4-5-20251001
        run: >
          python tests/eval_decision_relevance.py
          --multi-repo '{"adversarial": "test-results/.repos/medusa"}'
          --skill-variant from-skill-md
          -o test-results/m1-adversarial.json

      # ── M2 grounding-recall eval (hard gate, #280) ─────────────────
      # Drives the bicameral-bind skill against tests/fixtures/grounding_recall/
      # — synthetic fixture with 23 decisions across same-name-different-module,
      # similar-intent, and cross-language cases. Cache hits at
      # tests/eval/fixtures/bind_judge/ keep CI cost ~$0 unless the dataset,
      # fixture repo, or skill change.
      #
      # Gate flipped warn → hard after PR #285 produced a stable baseline:
      #   23 cases / precision 0.913 / recall 0.913 / abort_rate 0.000
      # all gates passed with ~7-13 pp headroom. Future PRs that touch the
      # bind handler / skill / fixture must keep recall ≥ 0.80, precision
      # ≥ 0.85, abort_rate ≤ 0.30 — OR explicitly re-record the cache
      # after a deliberate skill-prompt change. "Deliberate not drift."
      - name: M2 grounding-recall eval (hard gate)
        if: matrix.os == 'ubuntu-latest'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BICAMERAL_GROUNDING_EVAL_MODEL: claude-haiku-4-5-20251001
        run: >
          python tests/eval_grounding_recall.py
          --gate-mode hard
          -o test-results/m2-grounding-recall.json

      # ── Surface M2 metrics on the GitHub run summary (#280 PR-3) ───
      # Reads test-results/m2-grounding-recall.json and renders a markdown
      # table to $GITHUB_STEP_SUMMARY so reviewers can read precision /
      # recall / abort-rate without downloading the artifact. always()
      # guard means the summary still appears when the eval step above
      # fails the hard gate (so the breach line is visible inline).
      - name: M2 metrics summary
        if: always() && matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: python tests/eval_grounding_recall_summary.py test-results/m2-grounding-recall.json >> "$GITHUB_STEP_SUMMARY"

      # ── M6 preflight retrieval recall eval (warn-only, #58 Phase A) ──
      # Measures whether handle_preflight surfaces the intended decision
      # given (topic, file_paths). 25 cases balanced across the three miss
      # modes from #58: vocabulary_mismatch, unbound_decision,
      # transitive_relevance. Fresh memory:// ledger seeded per case for
      # isolation (preflight responses depend on full ledger state).
      #
      # Warm-up: same pattern as M1 and M2 — warn-only initially so the
      # first baseline run lands without breaking CI. Flip to --gate-mode
      # hard in a follow-up PR after one or two stable baseline readings.
      # No ANTHROPIC_API_KEY needed; preflight retrieval is deterministic
      # (BM25 + region lookup + 1-hop graph expansion). All-local cost.
      - name: M6 preflight recall eval (warn-only)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: >
          python tests/eval_preflight_m6_recall.py
          --gate-mode warn
          -o test-results/m6-preflight-recall.json

      # ── Surface M6 metrics on the GitHub run summary (#58 Phase A) ───
      # Reads test-results/m6-preflight-recall.json and renders the
      # per-miss-mode breakdown (vocabulary / unbound / transitive) +
      # missed-case detail so the failure modes Phase B targets are
      # visible inline on the run page. always() so the summary appears
      # even when the eval step above warns.
      - name: M6 metrics summary
        if: always() && matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: python tests/eval_preflight_m6_summary.py test-results/m6-preflight-recall.json >> "$GITHUB_STEP_SUMMARY"

      # ── M_skill_preflight — skill-layer preflight eval (hard gate, #306) ─
      # Two-step eval driven by the bicameral-preflight SKILL.md:
      #   Step-1 = relevance recall over the 25-row dataset (Part A #396)
      #   Step-0 = history-invocation rate over the 15-row dataset (Part B)
      # Both replay from cached fixtures at tests/eval/fixtures/skill_judge/
      # and tests/eval/fixtures/skill_invocation_judge/ — cache miss requires
      # the ANTHROPIC_API_KEY secret; commit the cache after a deliberate
      # SKILL.md change.
      #
      # Gates flipped warn → hard (#398) after two stable baseline runs
      # (#397 introduced the eval; #400 confirmed the substrate work
      # didn't disturb the numbers):
      #   Step-1: per-axis recall 100% (25/25 across M1/M4/FF1/D)
      #   Step-0: recall 100% (8/8), precision 88.9%, fp_rate 14.3%
      # All gates passed with ≥15 pp headroom on the load-bearing axes.
      # Future PRs that touch skills/bicameral-preflight/SKILL.md or the
      # eval datasets must EITHER keep:
      #   Step-1 per-axis recall ≥ 70%
      #   Step-0 should-invoke recall ≥ 50%
      #   Step-0 fp_rate ≤ 30%
      # OR explicitly re-record the cache via
      # BICAMERAL_PREFLIGHT_EVAL_RECORD=1 /
      # BICAMERAL_PREFLIGHT_INVOCATION_EVAL_RECORD=1 after a deliberate
      # skill-prompt change. "Deliberate not drift."
      - name: M_skill_preflight Step-1 (hard gate)
        if: matrix.os == 'ubuntu-latest'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BICAMERAL_PREFLIGHT_EVAL_MODEL: claude-haiku-4-5-20251001
        run: >
          python tests/eval_preflight_skill_step1.py
          --gate-mode hard
          -o test-results/skill-step1.json

      - name: M_skill_preflight Step-0 (hard gate)
        if: matrix.os == 'ubuntu-latest'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BICAMERAL_PREFLIGHT_INVOCATION_EVAL_MODEL: claude-haiku-4-5-20251001
        run: >
          python tests/eval_preflight_skill_invocation.py
          --gate-mode hard
          -o test-results/skill-step0.json

      # ── Surface M_skill_preflight metrics on the GitHub run summary ──
      # Reads both Step-1 + Step-0 JSONs and renders per-axis recall +
      # the 2x2 invocation confusion matrix + any FN cases. Fail-quiet
      # when JSON missing — never gates merge.
      - name: M_skill_preflight metrics summary
        if: always() && matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: >
          python tests/eval_preflight_skill_summary.py
          --step1 test-results/skill-step1.json
          --step0 test-results/skill-step0.json
          >> "$GITHUB_STEP_SUMMARY"

      # ── Generate rich E2E report from artifacts ────────────────────
      # Ubuntu-only: the script consumes the medusa adversarial corpus
      # (cloned only on Ubuntu above) plus the Phase 3 E2E artifacts
      # the report builds. Windows runs the unit + integration suite
      # for cross-platform coverage but skips the corpus-driven E2E.
      - name: Generate E2E report
        if: always() && matrix.os == 'ubuntu-latest'
        run: python tests/generate_e2e_report.py

      # ── Generate step summary from JUnit XML ───────────────────────
      # SHA-pinned to v2.4 (target=dist with bundled index.js); v2 mutable
      # tag was repointed to v2.5 (target=main) on 2026-05-07 which broke
      # the bundled artifact (#272). Pin per OWASP-03 / install-trust-model.
      - name: Test Summary
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86  # v2.4
        if: always()
        with:
          paths: test-results/results.xml
          show: fail, skip

      # ── Upload artifacts for qualitative review ────────────────────
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcp-test-results-${{ matrix.os }}
          path: test-results/
          retention-days: 30
