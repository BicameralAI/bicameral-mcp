name: MCP Regression Tests

on:
  pull_request:
    branches: [main, dev]

env:
  PYTHON_VERSION: '3.11'

jobs:
  mcp-tests:
    name: Thin-client regression suite
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -e ".[test]"
      - name: Run thin-client tests
        run: pytest tests/test_toolrequest_thin_client.py -q
      - name: Build package
        run: python -m build
