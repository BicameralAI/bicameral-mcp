<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bicameral — Decision Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #fbfaf7;
  --bg-soft:     #f5f3ed;
  --bg-card:     #ffffff;
  --border:      #e7e3d8;
  --border-soft: #efece3;
  --text:        #2a2825;
  --text-dim:    #75716a;
  --text-bright: #1a1816;
  --accent:      #3a5af6;
  --accent-soft: #eef0ff;
  --green:       #15803d;
  --green-soft:  #ecf7ee;
  --amber:       #b45309;
  --amber-soft:  #fdf4e3;
  --red:         #b91c1c;
  --red-soft:    #fdf0ef;
  --purple:      #7c3aed;
  --purple-soft: #f3eeff;
  --mono: "JetBrains Mono", "SF Mono", "Fira Code", Menlo, Monaco, Consolas, monospace;
  --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* ── TOP BAR ───────────────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 9px 28px;
  display: flex; align-items: center; gap: 14px;
}
.logo {
  font-family: var(--mono);
  font-size: 11.5px; font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--text-bright);
}
.logo-mark { color: var(--accent); }
.tb-dot { color: var(--border); font-size: 16px; line-height: 1; }
.status-pill {
  font-size: 10.5px; font-family: var(--mono);
  padding: 2px 9px; border-radius: 100px;
  border: 1px solid var(--border); color: var(--text-dim);
  letter-spacing: 0.02em;
}
.status-pill.live         { border-color: var(--green);  color: var(--green); }
.status-pill.connecting   { border-color: var(--amber);  color: var(--amber); }
.status-pill.disconnected { border-color: var(--red);    color: var(--red); }
.tb-ref {
  margin-left: auto;
  font-size: 11px; color: var(--text-dim); font-family: var(--mono);
  letter-spacing: 0.01em;
}

/* ── MAIN CONTENT ──────────────────────────────────────────── */
.main { max-width: 960px; margin: 0 auto; padding: 28px 28px 96px; }

.empty {
  padding: 72px 0; text-align: center;
  color: var(--text-dim); font-size: 12px; line-height: 2;
}
.empty code { color: var(--accent); background: var(--accent-soft); padding: 1px 5px; border-radius: 3px; }

.truncation-note {
  text-align: center; padding: 14px; color: var(--text-dim);
  font-size: 10.5px; border-top: 1px dashed var(--border); margin-top: 4px;
}
.truncation-note code { color: var(--accent); }

/* ── FEATURE ───────────────────────────────────────────────── */
.feature { margin-bottom: 2px; }

.feature-hdr {
  display: flex; align-items: center; gap: 0;
  padding: 7px 10px; border-radius: 5px;
  cursor: pointer; user-select: none;
  transition: background 100ms;
}
.feature-hdr:hover { background: var(--bg-soft); }

.f-chev {
  color: var(--text-dim); font-size: 9px; width: 16px;
  flex-shrink: 0; margin-right: 4px;
}
.f-name {
  font-size: 11.5px; font-weight: 500;
  letter-spacing: 0.07em;
  color: var(--text-bright);
  white-space: nowrap;
}
.f-rule {
  flex: 1; height: 1px;
  background: var(--border-soft);
  margin: 0 12px;
  min-width: 16px;
  opacity: 0;
  transition: opacity 150ms;
}
.feature.open .f-rule { opacity: 1; }

.f-counts { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
.fct { font-size: 11.5px; font-weight: 500; }
.fct.ok   { color: var(--green); }
.fct.warn { color: var(--amber); }
.fct.dim  { color: var(--text-dim); }
.fct.disc { color: var(--purple); }
.fct.sup  { color: var(--accent); opacity: 0.45; }

.feature-body {
  display: none;
  margin: 0 0 0 20px;
  border-left: 1px solid var(--border-soft);
  padding: 0 0 8px 0;
}
.feature.open .feature-body { display: block; }

.feature-sep {
  height: 1px; background: var(--border);
  margin: 0 0 4px 0;
}

/* ── DECISION ROW ──────────────────────────────────────────── */
.dec {
  border-bottom: 1px solid var(--border-soft);
  cursor: pointer;
}
.dec:last-child { border-bottom: none; }

.dec-hdr {
  display: flex; align-items: baseline; gap: 6px;
  padding: 6px 12px;
}
.dec-hdr:hover { background: var(--bg-soft); }

.d-chev {
  color: var(--text-dim); font-size: 9px;
  flex-shrink: 0; width: 12px; margin-right: 2px;
}
.d-text {
  flex: 1; font-style: italic;
  color: var(--text); font-size: 12px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.dec.open .d-text { white-space: normal; overflow: visible; text-overflow: unset; }

/* ── DOUBLE-ENTRY BADGE ────────────────────────────────────── */
/*
  Each decision has two pills side-by-side: [CLAIM] [FULFILLMENT]
  CLAIM   = the source side (was it recorded from a meeting/transcript/slack?)
  FULFIL  = the code side (is it grounded / reflected / drifted?)
  Together they show the "double-entry" ledger state at a glance.
*/
.d-badge {
  display: flex; align-items: center; gap: 4px;
  flex-shrink: 0; margin-left: 10px;
}
.badge-pill {
  font-size: 10px; font-family: var(--mono);
  padding: 1px 7px; border-radius: 3px;
  border: 1px solid; white-space: nowrap;
  letter-spacing: 0.02em;
}
/* claim side colors */
.bp-claim-present { color: var(--green);  border-color: var(--green);  background: var(--green-soft); }
.bp-claim-absent  { color: var(--purple); border-color: var(--purple); background: var(--purple-soft); }
/* fulfillment side colors */
.bp-code-ok       { color: var(--green);  border-color: var(--green);  background: var(--green-soft); }
.bp-code-drift    { color: var(--amber);  border-color: var(--amber);  background: var(--amber-soft); }
.bp-code-none     { color: var(--text-dim); border-color: var(--border); background: var(--bg-soft); }
.bp-code-sup      { color: var(--text-dim); border-color: var(--border); background: var(--bg-soft); opacity: 0.6; }

/* ── EXPANDED BODY — TWO COLUMNS ───────────────────────────── */
.dec-body {
  display: none;
  padding: 4px 12px 10px 26px;
}
.dec.open .dec-body { display: block; }

.dec-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 6px;
}

.col-hdr {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.08em; color: var(--text-dim);
  text-transform: uppercase;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border-soft);
  margin-bottom: 6px;
}

/* sources column */
.src-entry { margin-bottom: 10px; }
.src-entry:last-child { margin-bottom: 0; }
.src-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 10.5px; color: var(--text-dim); margin-bottom: 3px;
}
.src-type-pill {
  font-size: 9.5px; padding: 0 5px;
  background: var(--bg-soft); border: 1px solid var(--border-soft);
  border-radius: 2px; color: var(--text-dim);
}
.src-speaker { color: var(--text); font-weight: 500; }
.src-date    { color: var(--text-dim); }
.src-quote {
  padding: 6px 10px;
  background: rgba(255,255,255,0.65);
  border-left: 2px solid var(--border);
  border-radius: 0 4px 4px 0;
  font-style: italic; font-size: 11.5px;
  color: var(--text); line-height: 1.55;
}
.src-quote::before { content: '\201C'; color: var(--text-dim); font-size: 13px; }
.src-quote::after  { content: '\201D'; color: var(--text-dim); font-size: 13px; }
.no-sources {
  font-size: 11px; color: var(--purple); font-style: italic;
}

/* code column */
.code-entry { margin-bottom: 8px; }
.code-entry:last-child { margin-bottom: 0; }
.code-loc {
  display: flex; align-items: baseline; gap: 6px;
  font-size: 11px;
}
.code-file { color: var(--accent); }
.code-sym  { color: var(--text-dim); font-size: 10.5px; }
.code-status-line {
  font-size: 10.5px; margin-top: 2px;
}
.csl-ok    { color: var(--green); }
.csl-drift { color: var(--amber); }
.csl-none  { color: var(--text-dim); font-style: italic; }
.drift-detail {
  font-size: 10px; color: var(--amber);
  margin-top: 1px; padding-left: 10px;
}
.drift-detail::before { content: '⚠ '; }
.no-code {
  font-size: 11px; color: var(--text-dim); font-style: italic;
}
</style>
</head>
<body>

<header class="topbar">
  <span class="logo"><span class="logo-mark">▸</span> BICAMERAL</span>
  <span class="tb-dot">·</span>
  <span id="spill" class="status-pill connecting">connecting…</span>
  <span id="tref" class="tb-ref"></span>
</header>

<main class="main" id="root">
  <div class="empty">Loading decision ledger…</div>
</main>

<script>
// ── constants ────────────────────────────────────────────────
const ST = {
  reflected:  { fct: 'ok'   },
  drifted:    { fct: 'warn' },
  ungrounded: { fct: 'dim'  },
  superseded: { fct: 'sup'  },
  discovered: { fct: 'disc' },
  gap:        { fct: 'warn' },
};

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── counts ───────────────────────────────────────────────────
function counts(decisions) {
  const c = {};
  decisions.forEach(d => { c[d.status] = (c[d.status] || 0) + 1; });
  return c;
}

function renderCounts(c) {
  const icons = { reflected: '✓', drifted: '⚠', ungrounded: '○', discovered: '~', superseded: '↩', gap: '?' };
  return ['drifted','gap','ungrounded','discovered','reflected','superseded']
    .filter(s => c[s])
    .map(s => `<span class="fct ${(ST[s]||{fct:'dim'}).fct}">${c[s]}${icons[s]||'?'}</span>`)
    .join('');
}

// ── double-entry badge ───────────────────────────────────────
// Returns two pill spans: [CLAIM side] [FULFILLMENT side]
function renderBadge(d) {
  const srcs = d.sources || [];
  const hasClaim = srcs.length > 0;

  // Claim pill — what source type recorded this decision?
  let claimPill;
  if (d.status === 'gap') {
    claimPill = `<span class="badge-pill bp-code-drift">? open</span>`;
  } else if (!hasClaim) {
    claimPill = `<span class="badge-pill bp-claim-absent">~ codebase</span>`;
  } else {
    const t = srcs[0].source_type || 'source';
    claimPill = `<span class="badge-pill bp-claim-present">${esc(t)}</span>`;
  }

  // Fulfillment pill — what is the code-side state?
  let codePill;
  if (d.status === 'superseded') {
    codePill = `<span class="badge-pill bp-code-sup">↩ superseded</span>`;
  } else if (d.status === 'drifted') {
    codePill = `<span class="badge-pill bp-code-drift">⚠ drifted</span>`;
  } else if (d.status === 'reflected') {
    codePill = `<span class="badge-pill bp-code-ok">✓ reflected</span>`;
  } else if (d.status === 'ungrounded') {
    codePill = `<span class="badge-pill bp-code-none">○ ungrounded</span>`;
  } else if (d.status === 'gap') {
    codePill = `<span class="badge-pill bp-code-none">○ none</span>`;
  } else {
    // discovered — has code but no source (already handled claim side)
    codePill = `<span class="badge-pill bp-code-ok">✓ in code</span>`;
  }

  return `<div class="d-badge">${claimPill}${codePill}</div>`;
}

// ── sources column ───────────────────────────────────────────
function renderSources(d) {
  const srcs = d.sources || [];
  if (d.status === 'gap') {
    const q = d.summary.replace(/^\[Open Question\]\s*/i, '');
    return `<div class="no-sources" style="color:var(--amber)">? open question / requirement gap</div>
<div style="font-size:11px;color:var(--text-dim);margin-top:4px;font-style:italic">${esc(q)}</div>`;
  }
  if (!srcs.length) {
    return `<div class="no-sources">~ no meeting source — decision exists in code only</div>
<div style="font-size:10.5px;color:var(--text-dim);margin-top:4px;font-style:italic">
  Ingest the meeting where this was decided, or acknowledge as standing policy.
</div>`;
  }
  return srcs.map(s => {
    const meta = [s.date ? s.date.slice(0,10) : '', s.speaker ? `<span class="src-speaker">${esc(s.speaker)}</span>` : ''].filter(Boolean).join(' · ');
    return `
<div class="src-entry">
  <div class="src-meta">
    <span class="src-type-pill">${esc(s.source_type || 'source')}</span>
    ${s.source_ref ? `<span>${esc(s.source_ref)}</span>` : ''}
    ${meta ? `<span>${meta}</span>` : ''}
  </div>
  ${s.quote ? `<div class="src-quote">${esc(s.quote)}</div>` : ''}
</div>`;
  }).join('');
}

// ── code column ──────────────────────────────────────────────
function renderCode(d) {
  const f = d.fulfillment;
  if (!f) {
    return `<div class="no-code">No code region found${d.status === 'ungrounded' ? ' — decision not yet implemented' : ''}.</div>`;
  }

  const sym = f.symbol ? `<span class="code-sym">${esc(f.symbol)}</span>` : '';
  const loc = `${esc(f.file_path)}:${f.start_line}–${f.end_line}`;

  let statusLine;
  if (d.status === 'drifted') {
    const hashDelta = (f.baseline_hash && f.current_hash)
      ? `${f.baseline_hash.slice(0,7)} → ${f.current_hash.slice(0,7)}`
      : '';
    const driftMsg = hashDelta || d.drift_evidence || 'content changed since last sync';
    statusLine = `<div class="code-status-line csl-drift">⚠ drifted</div>
      <div class="drift-detail">${esc(driftMsg)}</div>`;
  } else if (d.status === 'reflected') {
    statusLine = `<div class="code-status-line csl-ok">✓ reflected</div>`;
  } else {
    statusLine = `<div class="code-status-line csl-none">${d.status}</div>`;
  }

  return `
<div class="code-entry">
  <div class="code-loc">
    <span class="code-file">${loc}</span>
    ${sym}
  </div>
  ${statusLine}
</div>`;
}

// ── decision row ──────────────────────────────────────────────
function renderDec(d, idx) {
  return `
<div class="dec" id="d${idx}" onclick="toggleDec(this)">
  <div class="dec-hdr">
    <span class="d-chev">▶</span>
    <span class="d-text">${esc('"' + d.summary + '"')}</span>
    ${renderBadge(d)}
  </div>
  <div class="dec-body">
    <div class="dec-cols">
      <div>
        <div class="col-hdr">Claim — sources</div>
        ${renderSources(d)}
      </div>
      <div>
        <div class="col-hdr">Fulfillment — code</div>
        ${renderCode(d)}
      </div>
    </div>
  </div>
</div>`;
}

// ── feature ───────────────────────────────────────────────────
function hasPriority(f) {
  const s = new Set(f.decisions.map(d => d.status));
  return s.has('drifted') || s.has('ungrounded') || s.has('discovered');
}

function renderFeature(f, fi) {
  const c    = counts(f.decisions);
  const open = hasPriority(f);
  const decs = f.decisions.map((d, di) => renderDec(d, fi * 1000 + di)).join('');

  return `
<div class="feature${open ? ' open' : ''}" id="ft${fi}">
  <div class="feature-hdr" onclick="toggleFeature('ft${fi}')">
    <span class="f-chev">${open ? '▼' : '▶'}</span>
    <span class="f-name">${esc(f.name.toUpperCase())}</span>
    <span class="f-rule"></span>
    <span class="f-counts">${renderCounts(c)}</span>
  </div>
  <div class="feature-body">
    <div class="feature-sep"></div>
    ${decs}
  </div>
</div>`;
}

// ── render ────────────────────────────────────────────────────
function render(data) {
  const features = data.features || [];
  document.getElementById('tref').textContent =
    data.as_of ? `@ ${String(data.as_of).slice(0, 9)}` : '';

  if (!features.length) {
    document.getElementById('root').innerHTML = `
<div class="empty">
  No decisions tracked yet.<br>
  Run <code>bicameral.ingest</code> to populate the ledger.
</div>`;
    return;
  }

  const sorted = [...features].sort((a, b) => {
    const pri = f => hasPriority(f) ? 0 : 1;
    return pri(a) - pri(b);
  });

  const truncNote = data.truncated
    ? `<div class="truncation-note">Showing 50 of ${data.total_features} features — use <code>feature_filter</code> in bicameral.history to drill in.</div>`
    : '';

  document.getElementById('root').innerHTML =
    sorted.map((f, i) => renderFeature(f, i)).join('') + truncNote;
}

// ── toggle ────────────────────────────────────────────────────
function toggleFeature(id) {
  const el   = document.getElementById(id);
  const open = el.classList.toggle('open');
  el.querySelector('.f-chev').textContent = open ? '▼' : '▶';
}

function toggleDec(el) {
  const open = el.classList.toggle('open');
  el.querySelector('.d-chev').textContent = open ? '▼' : '▶';
}

// ── live connection ────────────────────────────────────────────
const pill = document.getElementById('spill');

function connect() {
  pill.className = 'status-pill connecting';
  pill.textContent = 'connecting…';
  const es = new EventSource('/events');
  es.onopen    = () => { pill.className = 'status-pill live'; pill.textContent = '● live'; };
  es.onmessage = e => { try { render(JSON.parse(e.data)); } catch {} };
  es.onerror   = () => {
    pill.className = 'status-pill disconnected';
    pill.textContent = '✕ disconnected';
    es.close();
    setTimeout(connect, 4000);
  };
}

fetch('/history').then(r => r.json()).then(render).catch(() => {});
connect();
</script>
</body>
</html>
